# ---------------------------------------------------------------------------
# Vistaar Backend (Express) — GitLab CI/CD. Pipeline runs only for an MR
# targeting main, or main itself. On merge to main → build gate → auto-deploy
# to the shared DO app server (pm2 + nginx, api-vistaar.yugam.co, port 4300).
# Env from the GitLab File variable APP_ENV (written to /srv/vistaar-backend/.env).
# Required CI/CD vars (Protected): SSH_PRIVATE_KEY, SSH_KNOWN_HOSTS,
#   DEPLOY_HOST, DEPLOY_USER, APP_ENV (File).
# ---------------------------------------------------------------------------
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: never

stages:
  - ci
  - deploy

variables:
  DEPLOY_PATH: "/srv/vistaar-backend"

# Build gate — verify deps install, the entrypoint parses, and tests pass.
build_test:
  stage: ci
  image: node:20-bullseye
  script:
    - npm ci
    - node --check server.js
    - npm test
    - echo "gate OK"

deploy_production:
  stage: deploy
  image: alpine:3.20
  needs:
    - build_test
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache openssh-client rsync bash
    - eval "$(ssh-agent -s)"
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts && chmod 644 ~/.ssh/known_hosts
  script:
    - >
      rsync -az --delete
      --exclude '.git' --exclude 'node_modules' --exclude '.env' --exclude '.env.*'
      --exclude '*.log'
      ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"
    - scp "$APP_ENV" "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.env"
    - ssh "$DEPLOY_USER@$DEPLOY_HOST" "chmod 600 $DEPLOY_PATH/.env && cd $DEPLOY_PATH && npm ci --omit=dev && pm2 startOrReload ecosystem.config.cjs --update-env && pm2 save"
    - ssh "$DEPLOY_USER@$DEPLOY_HOST" "sleep 4 && curl -fsS --max-time 10 http://127.0.0.1:4300/health >/dev/null && echo healthy || (echo UNHEALTHY; exit 1)"
  environment:
    name: production
    url: https://api-vistaar.yugam.co
